sonar.projectKey=nangman-crypto-intel-structuring
sonar.projectName=nangman-crypto-intel-structuring
sonar.sourceEncoding=UTF-8

sonar.sources=src,scripts,ecs,.github/workflows
sonar.tests=tests
sonar.exclusions=target/**,sonar-reports/**
sonar.coverage.exclusions=scripts/**,ecs/**,.github/**,src/main.rs,src/bin/**,src/storage/object_store.rs,src/nats/**,src/ai/bedrock.rs

sonar.rust.cargo.manifestPaths=Cargo.toml
sonar.rust.clippy.enable=false
sonar.rust.clippy.reportPaths=sonar-reports/clippy.json
sonar.rust.lcov.reportPaths=sonar-reports/lcov.info
